apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: native-sfu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: backend
          image: native-sfu/backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: native-sfu-config
            - secretRef:
                name: native-sfu-secrets
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 3000
            - name: media-udp
              containerPort: 40000
              protocol: UDP
            - name: pipe-udp
              containerPort: 41000
              protocol: UDP
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 30"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: native-sfu
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
    - name: media-udp
      port: 40000
      targetPort: media-udp
      protocol: UDP
    - name: pipe-udp
      port: 41000
      targetPort: pipe-udp
      protocol: UDP
