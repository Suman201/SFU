<sfu-auth-layout [role]="expectedRole" [title]="title" [subtitle]="subtitle">
  <form class="auth-panel" [formRoot]="form" (submit)="submit($event)">
    <header>
      <div>
        <p class="eyebrow">{{ expectedRole }} portal</p>
        <h1>{{ title }}</h1>
      </div>
      <a [routerLink]="alternateLoginPath">Use {{ alternateRole }} login</a>
    </header>

    <label>
      Email
      <input [formField]="form.email" autocomplete="email">
    </label>

    <label class="password-field">
      Password
      <div class="password-input-wrap">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          [formField]="form.password"
          autocomplete="current-password"
        >
        <button
          type="button"
          class="password-toggle"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          [attr.aria-pressed]="showPassword()"
        >
          <span aria-hidden="true">
            {{ showPassword() ? '🙈' : '👁' }}
          </span>
        </button>
      </div>
    </label>

    <div class="remember-row">
      <label class="checkbox-row">
        <input type="checkbox" [checked]="rememberMe()" (change)="updateRememberMe($event)">
        <span>Remember me</span>
      </label>
    </div>

    <button class="primary" type="submit" [disabled]="form().invalid() || busy()">
      {{ busy() ? 'Checking...' : 'Login' }}
    </button>

    @if (error() || auth.sessionNotice()) {
      <p class="error">{{ error() || auth.sessionNotice() }}</p>
    }

    <p class="secondary-link">
      New here? <a routerLink="/register">Create a student account</a>
    </p>
  </form>
</sfu-auth-layout>
