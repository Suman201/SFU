apiVersion: v1
kind: Secret
metadata:
  name: native-sfu-secrets
  namespace: native-sfu
type: Opaque
# Example placeholders only. Copy these keys into your secret manager or a private
# manifest outside version control, then replace every value before applying.
stringData:
  MONGODB_URI: mongodb://user:password@mongo:27017/native_sfu?authSource=admin
  REDIS_URL: redis://:password@redis:6379
  JWT_ACCESS_SECRET: replace-with-strong-access-secret
  JWT_REFRESH_SECRET: replace-with-strong-refresh-secret
  OPERATIONS_TOKEN: replace-with-strong-operations-token
  TURN_SECRET: replace-with-turn-rest-secret
  WEBHOOK_SECRET_ENCRYPTION_KEY: replace-with-strong-webhook-encryption-key
  PIPE_CLUSTER_SECRET: replace-with-strong-pipe-cluster-secret
  S3_ENDPOINT: ""
  S3_BUCKET: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""
