<section
  #chatElement
  class="session-chat"
  [class.collapsed]="isCollapsed()"
  [class.docked]="docked()"
  [class.dragging]="dragging()"
  [style.transform]="dragTransform()"
  aria-label="Class chat"
  (pointermove)="drag($event, chatElement)"
  (pointerup)="endDrag($event, chatElement)"
  (pointercancel)="endDrag($event, chatElement)"
>
  <button
    class="chat-toggle drag-handle"
    type="button"
    [attr.aria-expanded]="!isCollapsed()"
    [title]="isCollapsed() ? 'Open class chat' : 'Collapse class chat'"
    (pointerdown)="startDrag($event, chatElement)"
    (click)="toggleCollapsed($event)"
  >
    <span class="drag-grip" aria-hidden="true"></span>
    <span class="chat-icon" aria-hidden="true"></span>
    <span>Class chat</span>
    @if (unreadCount()) {
      <strong>{{ unreadCount() }}</strong>
    }
  </button>

  @if (!isCollapsed()) {
    <div class="chat-panel">
      <header class="chat-header drag-handle" (pointerdown)="startDrag($event, chatElement)">
        <span class="drag-grip" aria-hidden="true"></span>
        <div>
          <p>Live discussion</p>
          <h2>Class chat</h2>
        </div>
        <button
          type="button"
          class="icon-button collapse-button"
          title="Collapse chat"
          aria-label="Collapse chat"
          (pointerdown)="$event.stopPropagation()"
          (click)="toggleCollapsed($event)"
        >
          <span aria-hidden="true"></span>
        </button>
      </header>

      <div class="message-list" aria-live="polite">
        @for (message of messages(); track message.id) {
          <article class="message" [class.mine]="message.mine">
            <div class="message-meta">
              <strong>{{ message.author }}</strong>
              <span>{{ message.role }} · {{ message.sentAt }}</span>
            </div>
            <p>{{ message.body }}</p>
          </article>
        }
      </div>

      <form class="chat-composer" [formRoot]="chatForm" (submit)="sendMessage($event)">
        <input
          type="text"
          autocomplete="off"
          placeholder="Message class"
          [formField]="chatForm.message"
        />
        <button
          type="submit"
          class="send-button"
          [disabled]="!chatModel().message.trim() || chatForm().invalid()"
          title="Send message"
          aria-label="Send message"
        >
          <span aria-hidden="true"></span>
        </button>
      </form>
    </div>
  }
</section>
