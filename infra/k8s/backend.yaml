apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: native-sfu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Keep this long enough for an explicit drain request, readiness withdrawal,
      # and any external load balancer deregistration before SIGKILL.
      terminationGracePeriodSeconds: 45
      containers:
        - name: backend
          image: native-sfu/backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: native-sfu-config
            - secretRef:
                name: native-sfu-secrets
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 3000
          # Media UDP exposure must cover the full configured host/pipe ranges.
          # This example deployment intentionally leaves transport exposure to the
          # operator so it does not pretend that a single UDP service port is enough.
          # Planned rollouts should drain the node first and wait for /health/ready
          # to fail before allowing the pod to terminate.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          # If you add a preStop hook in your environment, make it trigger the
          # drain workflow and observe readiness withdrawal instead of sleeping.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: native-sfu
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
