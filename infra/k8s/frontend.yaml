apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: native-sfu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: native-sfu/frontend:latest
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: native-sfu
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
