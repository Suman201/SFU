x-backend-common-env: &backend-common-env
  NODE_ENV: development
  MONGODB_URI: mongodb://mongo:27017/native_sfu
  REDIS_URL: redis://redis:6379
  REDIS_REQUIRED: "true"
  JWT_ACCESS_SECRET: local-multinode-access-key-2026-32chars
  JWT_REFRESH_SECRET: local-multinode-refresh-key-2026-32chars
  TURN_REALM: native-sfu.local
  TURN_SECRET: local-multinode-turn-key-2026-32chars
  TURN_URIS: ${TURN_URIS:-}
  OPERATIONS_TOKEN: local-multinode-operations-token-32chars
  WEBHOOK_SECRET_ENCRYPTION_KEY: local-multinode-webhook-key-2026-32chars
  WEBHOOK_DELIVERY_ENABLED: ${WEBHOOK_DELIVERY_ENABLED:-false}
  FRONTEND_URL: http://127.0.0.1:4200
  CORS_ALLOWED_ORIGINS: http://127.0.0.1:4200,http://127.0.0.1:4300,http://localhost:4200,http://localhost:4300
  MEDIA_WORKER_MODE: worker
  MEDIA_WORKER_COUNT: ${MEDIA_WORKER_COUNT:-1}
  NODE_REGION: local
  NODE_HEARTBEAT_INTERVAL_MS: "2500"
  NODE_TTL_MS: "10000"
  NODE_MAX_ROOMS: ${NODE_MAX_ROOMS:-1000}
  NODE_MAX_TRANSPORTS: ${NODE_MAX_TRANSPORTS:-5000}
  ENABLE_PIPE_TRANSPORT: ${ENABLE_PIPE_TRANSPORT:-true}
  PIPE_CLUSTER_SECRET: local-multinode-pipe-key-2026-32chars
  PIPE_COORDINATION_TIMEOUT_MS: "5000"
  PIPE_COORDINATION_MAX_ATTEMPTS: "3"
  PIPE_MAX_SETUP_REQUESTS_PER_MINUTE: "240"
  METRICS_ENABLED: "true"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-multinode-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-multinode-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-a:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-common-env
      PORT: "3000"
      PUBLIC_URL: http://127.0.0.1:3000
      NODE_ID: compose-node-a
      NODE_ZONE: local-a
      NODE_PUBLIC_URL: http://127.0.0.1:3000
      HOST_CANDIDATE_PORT_RANGE: 40000-40020
      PIPE_ADVERTISE_IP: backend-a
      PIPE_PORT_RANGE: 41000-41020
    ports:
      - "3000:3000"
      - "40000-40020:40000-40020/udp"
      - "41000-41020:41000-41020/udp"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - recordings-a:/app/recordings
      - chat-attachments-a:/app/chat-attachments
      - class-materials-a:/app/class-materials
      - profile-media-a:/app/profile-media
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend-b:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-common-env
      PORT: "3000"
      PUBLIC_URL: http://127.0.0.1:3002
      NODE_ID: compose-node-b
      NODE_ZONE: local-b
      NODE_PUBLIC_URL: http://127.0.0.1:3002
      HOST_CANDIDATE_PORT_RANGE: 40021-40040
      PIPE_ADVERTISE_IP: backend-b
      PIPE_PORT_RANGE: 41021-41040
    ports:
      - "3002:3000"
      - "40021-40040:40021-40040/udp"
      - "41021-41040:41021-41040/udp"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - recordings-b:/app/recordings
      - chat-attachments-b:/app/chat-attachments
      - class-materials-b:/app/class-materials
      - profile-media-b:/app/profile-media
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongo-multinode-data:
  redis-multinode-data:
  recordings-a:
  recordings-b:
  chat-attachments-a:
  chat-attachments-b:
  class-materials-a:
  class-materials-b:
  profile-media-a:
  profile-media-b:
