<main class="login-page">
  <section class="login-panel" aria-labelledby="admin-login-title">
    <div class="brand-mark" aria-hidden="true">NS</div>
    <p class="eyebrow">Admin portal</p>
    <h1 id="admin-login-title">Native SFU operations</h1>
    <p class="lede">Sign in with an admin or super admin account to review live class delivery and attendance.</p>

    @if (sessionNotice()) {
      <p class="notice">{{ sessionNotice() }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" placeholder="admin@example.com" />
      </label>

      <label>
        <span>Password</span>
        <div class="password-field">
          <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" autocomplete="current-password" />
          <button type="button" class="text-button" (click)="togglePassword()">
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
      </label>

      <label class="remember-row">
        <input type="checkbox" formControlName="rememberMe" />
        <span>Keep me signed in</span>
      </label>

      @if (error()) {
        <p class="error" role="alert">{{ error() }}</p>
      }

      <button type="submit" class="primary-action" [disabled]="busy()">
        {{ busy() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </section>
</main>
